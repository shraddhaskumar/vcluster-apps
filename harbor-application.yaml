apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.13.0
    helm:
      releaseName: harbor
      parameters:
        - name: expose.type
          value: nodePort
        - name: externalURL
          value: http://harbor.local
        - name: expose.tls.auto.commonName
          value: harbor.local
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
